name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancela ejecuciones obsoletas cuando llegan commits nuevos al mismo PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Unit tests + assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Cache de ~/.gradle/{caches,wrapper}; clave por hash de toml + wrapper.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Inyectamos las keys del repo como env vars; `localProperty()` en
      # app/build.gradle.kts ya hace fallback a System.getenv() cuando no hay
      # local.properties. Si los secrets no están configurados todavía, el
      # build compila igual (los BuildConfig strings quedan vacíos) — los
      # tests y assembleDebug NO requieren keys reales.
      - name: Run unit tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload debug APK
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
